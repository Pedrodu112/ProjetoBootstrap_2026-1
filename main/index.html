<!DOCTYPE html>

                <ul class="navbar-nav ms-auto"> <!-- Lista de itens do menu -->

                    <!-- Item do menu -->
                    <li class="nav-item">

                                Início
                            </button>
                        </a>
                    </li>

                    <!-- Item do menu -->
                    <li class="nav-item">
                        <a class="nav-link" href="cosmeticos.html">
                            <button class="btn btn-secondary botao-animado btn-sm fonttitle">
                                Cosmeticos
                            </button>
                        </a>
                    </li>

                    <!-- Item do menu -->
                    <li class="nav-item">
                        <a class="nav-link" href="dashboard.html">

                                Dashboard
                            </button>
                        </a>
                    </li>

                    <!-- Item do menu -->
                    <li class="nav-item">

                    </li>

                    <!-- Item do menu -->
                    <li class="nav-item">

                                Cadastrar
                            </button>
                        </a>
                    </li>

                </ul>
            </div>

        </div>

    <!-- CONTAINER DA IMAGEM CENTRAL -->

        <img src="../Galeria/in/cupeludo.jpg"

             alt="Imagem">
    </div>

<div class="container mt-5">

    <h2 class="text-center mb-4">🔥 Destaques da Loja</h2>
  
    <div class="row">
  
      <!-- MAIS VENDIDO -->
      <div class="col-md-6">
        <div class="card destaque-produto position-relative">
  
          <span class="badge bg-success position-absolute top-0 start-0 m-2">
            MAIS VENDIDO
          </span>
  
          <img src="../Cosmeticos/IMG/THE_RUSTIC.png" class="card-img-top">
  
          <div class="card-body text-center">
            <h5 class="fw-bold">The Rustic</h5>
            <p>O queridinho da galera 🔥</p>
  
            <h4 class="fw-bold">R$ 142,00</h4>
  
            <a href="cosmeticos.html" class="btn btn-danger mt-2">
              Ver produto
            </a>
          </div>
  
        </div>
      </div>
  
      <!-- MAIS BARATO -->
      <div class="col-md-6">
        <div class="card destaque-produto position-relative">
  
          <span class="badge bg-warning text-dark position-absolute top-0 start-0 m-2">

          </span>
  
          <img src="../Cosmeticos/IMG/RUSTIC_VOYAGE.png" class="card-img-top">
  
          <div class="card-body text-center">
            <h5 class="fw-bold">Rustic Voyage Men</h5>

            </a>

    </footer>
