  <div class="container">
    <a class="navbar-brand fonttitle" href="#">Perfumaria do Zé</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto">

        <li class="nav-item">
          <a class="nav-link" href="index.html"><button class="btn btn-secondary botao-animado btn-sm fonttitle">Início</button></a>

          <a class="nav-link" href="cosmeticos.html"><button class="btn btn-secondary botao-animado btn-sm fonttitle">Cosmeticos</button></a>

</nav>

<section class="container mt-5">

    <h2 class="mb-4">Cadastro de Cliente</h2>

    <div class="form-box p-4 mx-auto">

        <form>

            <!-- Nome -->
            <div class="mb-3 text-start">
                <label class="form-label">Nome completo</label>
                <input type="text" class="form-control" placeholder="Digite seu nome">
            </div>

            <!-- Email -->
            <div class="mb-3 text-start">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" placeholder="Digite seu email">
            </div>

            <!-- Select -->
            <div class="mb-3 text-start">
                <label class="form-label">Tipo de cliente</label>
                <select class="form-control">
                    <option>Selecione</option>
                    <option>Masculino</option>
                    <option>Feminino</option>
                </select>
            </div>

            <!-- Textarea -->
            <div class="mb-3 text-start">
                <label class="form-label">Preferências</label>
                <textarea class="form-control" rows="4" placeholder="Descreva perfumes que você gosta"></textarea>
            </div>

            <!-- Botão -->
            <button type="button" class="btn btn-danger w-100" data-bs-toggle="modal" data-bs-target="#modalCadastro">
                Cadastrar
            </button>

        </form>

    </div>

</section>

<!-- MODAL -->
<div class="modal fade" id="modalCadastro" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Cadastro realizado!</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <p>Seu cadastro foi feito com sucesso! 🎉</p>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
      </div>

    </div>
  </div>
</div>

  <a href="dashboard.html" class="btn btn-danger mt-3">
      Dashboard
  </a>
